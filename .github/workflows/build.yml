name: Build Multi-Platform Release

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > SourceCode/android-keystore.jks
      
      - name: Build Android APK
        working-directory: ./SourceCode
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Sign APK
        working-directory: ./SourceCode
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android-keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            composeApp/build/outputs/apk/release/composeApp-release-unsigned.apk \
            ${{ secrets.KEY_ALIAS }}
      
      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 \
            SourceCode/composeApp/build/outputs/apk/release/composeApp-release-unsigned.apk \
            app-release.apk
      
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build macOS App
        working-directory: ./SourceCode
        run: |
          chmod +x gradlew
          ./gradlew packageDmg
      
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: SourceCode/composeApp/build/compose/binaries/main/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build Windows App
        working-directory: ./SourceCode
        run: |
          ./gradlew packageMsi
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: SourceCode/composeApp/build/compose/binaries/main/msi/*.msi

  commit-releases:
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Releases Directory
        run: mkdir -p Releases
      
      - name: Move Artifacts to Releases
        run: |
          mv artifacts/android-release/* Releases/ || true
          mv artifacts/macos-release/* Releases/ || true
          mv artifacts/windows-release/* Releases/ || true
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Releases/
          git commit -m "Release build $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
